<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPLOY - Global Staffing Solutions</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root {
            --primary-color: #1e3c72;
            --accent-color: #ff6f61;
            --text-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            background: #f9f9f9;
        }

        /* Particle Container */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, var(--primary-color), #2a5298);
        }

        /* Animated V Logo */
        .v-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            z-index: 1000;
            animation: float 3s ease-in-out infinite;
        }

        .v-logo path {
            stroke: var(--accent-color);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 200;
            animation: draw 2s ease-out forwards;
        }

        /* Header Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        /* Geometric Sections */
        .section {
            padding: 80px 20px;
            position: relative;
            background: white;
            clip-path: polygon(0 5%, 100% 0, 100% 95%, 0 100%);
            margin: -50px 0;
        }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .service-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        /* Contact Form */
        .contact-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        button {
            background: var(--accent-color);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes draw {
            from { stroke-dashoffset: 200; }
            to { stroke-dashoffset: 0; }
        }

        /* Particle Trail Effect */
        .particle-trail {
            position: absolute;
            pointer-events: none;
            width: 10px;
            height: 10px;
            background: var(--accent-color);
            border-radius: 50%;
            mix-blend-mode: multiply;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="particle-trail"></div>

    <!-- Animated V Logo -->
    <svg class="v-logo" viewBox="0 0 24 24">
        <path d="M1 1l8 22 7-22M16 1l7 22"/>
    </svg>

    <!-- Hero Section -->
    <section class="hero">
        <div>
            <h1>Unlock Global Talent</h1>
            <p>Revolutionizing Staffing Solutions Worldwide</p>
            <button>Get Started</button>
        </div>
    </section>

    <!-- Services Section -->
    <section class="section">
        <div class="service-grid">
            <div class="service-card">
                <h3>Temporary Staffing</h3>
                <p>Flexible workforce solutions for short-term needs</p>
            </div>
            <div class="service-card">
                <h3>Dedicated Teams</h3>
                <p>Build specialized teams for long-term success</p>
            </div>
            <div class="service-card">
                <h3>BPO Solutions</h3>
                <p>Complete business process outsourcing services</p>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="section" style="margin-top: -100px; padding-top: 150px;">
        <div class="contact-container">
            <h2>Contact Us</h2>
            <form action="https://formspree.io/f/myzkrznl" method="POST">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </section>

    <script>
        // Particle Configuration
        particlesJS('particles-js', {
            particles: {
                number: { value: 80 },
                color: { value: '#ffffff' },
                shape: { type: 'circle' },
                opacity: { value: 0.5 },
                size: { value: 3 },
                move: {
                    enable: true,
                    speed: 2,
                    direction: 'none',
                    random: false,
                    straight: false,
                    out_mode: 'out',
                    bounce: false
                }
            },
            interactivity: {
                detect_on: 'canvas',
                events: {
                    onhover: { enable: true, mode: 'repulse' },
                    onclick: { enable: true, mode: 'push' },
                    resize: true
                }
            },
            retina_detect: true
        });

        // Mouse Trail Effect
        document.addEventListener('mousemove', (e) => {
            const trail = document.querySelector('.particle-trail');
            trail.style.left = `${e.pageX}px`;
            trail.style.top = `${e.pageY}px`;
            
            // Create temporary particles
            for(let i = 0; i < 3; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle-trail';
                particle.style.left = `${e.pageX}px`;
                particle.style.top = `${e.pageY}px`;
                document.body.appendChild(particle);
                
                // Animate and remove particles
                setTimeout(() => {
                    particle.style.transform = `translate(${Math.random()*20-10}px, ${Math.random()*20-10}px) scale(0)`;
                    particle.style.opacity = 0;
                    setTimeout(() => particle.remove(), 1000);
                }, 50);
            }
        });

        // Scroll Animations
        window.addEventListener('scroll', () => {
            const cards = document.querySelectorAll('.service-card');
            cards.forEach((card, index) => {
                const cardTop = card.getBoundingClientRect().top;
                if(cardTop < window.innerHeight * 0.8) {
                    card.style.opacity = 1;
                    card.style.transform = 'translateY(0)';
                }
            });
        });
    </script>
</body>
</html>
